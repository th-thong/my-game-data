services:
  mongodb:
    image: mongo:latest
    container_name: mongodb-data-dev
    ports:
      - "27000:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin
    volumes:
      - ./mongodb_data:/data/db 
    networks:
      - my-game-network

  data_service:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: my-game-data-dev
    container_name: my-game-data-dev-container
    ports:
      - "10000:8080"
    env_file:
      - .env
    volumes:
      - .:/app
    working_dir: /app
    depends_on:
      - mongodb
    networks:
      - my-game-network

networks:
  my-game-network:
    driver: bridge